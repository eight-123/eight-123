<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>🚚 積み込みリスト（検索＆ドラッグ対応・タブレット対応）</title>

<style>
body{
  font-family:sans-serif;
  background:#f0f0f0;
  padding:20px;
}

.item{
  background:white;
  padding:15px;
  margin:12px 0;
  border-radius:10px;
  display:flex;
  align-items:center;
  gap:15px;
}

.item.dragging {
  opacity:0.5;
  border:2px dashed #999;
}

.name{
  width:140px;
  font-weight:bold;
}

.need{ width:60px; }

.counter{
  display:flex;
  align-items:center;
  gap:10px;
}

.load{
  width:60px;
  text-align:center;
  font-size:18px;
}

button.a{
  width:160px;
  height:60px;
  font-size:26px;
  border:none;
  border-radius:12px;
  background:#ddd;
  cursor:pointer;
}

button.b{
  width:60px;
  height:60px;
  font-size:26px;
  border:none;
  border-radius:12px;
  background:#ddd;
}

button:active{
  background:#bbb;
}

.delete{
  width:60px;
  height:60px;
  font-size:26px;
  border:none;
  border-radius:12px;
  background:#ffb3b3;
  cursor:pointer;
}

.done{
  background:#c8ffd0;
}

.add{
  width:auto;
  height:auto;
  padding:10px 20px;
  font-size:18px;
  margin-top:15px;
}

.topbar{
  width:340px;
  height:60px;
  font-size:26px;
  display:flex;
  gap:10px;
}

.check{
  transform:scale(1.5);
}

.search-bar{
  margin:10px 0;
}
.search-bar input{
  width:200px;
  font-size:16px;
  padding:4px;
}
.search-bar button{
  font-size:16px;
  padding:4px 10px;
  margin-left:5px;
}

.import-area{
  margin:10px 0;
}
.import-area textarea{
  width:100%;
  font-size:16px;
  padding:4px;
}
.import-area button{
  font-size:16px;
  padding:4px 10px;
  margin-top:5px;
}
</style>
</head>

<body>

<h1>🚚 積み込みリスト</h1>

<div class="topbar">
  <button class="a" onclick="exportText()">📋 書き出し</button>
</div>

<div class="search-bar">
  🔍 <input type="text" id="searchInput" placeholder="検索">
  <button onclick="searchItem()">検索</button>
</div>

<div class="import-area">
  📥 読み込み用（改行ごとに項目）
  <textarea id="importArea" rows="5" placeholder="名前と必要数を文字＋数字で入力"></textarea>
  <br>
  <button onclick="importTextArea()">読み込み</button>
</div>

<div id="list"></div>

<button class="add" onclick="addItem()">＋ 項目追加</button>

<script>
/////////////////////
// ドラッグ用変数
/////////////////////
let draggedItem = null;

/////////////////////
// 項目生成
/////////////////////
function createItem(name="新しい項目",need=1,load=0){
  let div=document.createElement("div");
  div.className="item";
  div.setAttribute("draggable", true);

  div.innerHTML=`
    <div class="name" contenteditable="true">${name}</div>
    必要
    <input class="need" type="number" value="${need}">
    <div class="counter">
      <button class="b" onclick="change(this,-1)">−</button>
      <input class="load" type="number" value="${load}" readonly>
      <button class="b" onclick="change(this,1)">＋</button>
    </div>
    <input type="checkbox" class="check" disabled>
    <button class="delete" onclick="removeItem(this)">🗑</button>
  `;

  // ドラッグイベント
  div.addEventListener('dragstart', handleDragStart);
  div.addEventListener('dragover', handleDragOver);
  div.addEventListener('drop', handleDrop);
  div.addEventListener('dragend', handleDragEnd);

  document.getElementById("list").appendChild(div);

  div.querySelector(".need").addEventListener("input",()=>update(div));

  update(div);
}

/////////////////////
// 追加
/////////////////////
function addItem(){
  let name = prompt("項目名を入力");
  if(!name)return;
  createItem(name,1,0);
  autoSave();
}

/////////////////////
// 削除
/////////////////////
function removeItem(btn){
  if(confirm("削除しますか？")){
    btn.closest(".item").remove();
    autoSave();
  }
}

/////////////////////
// カウント変更
/////////////////////
function change(btn,delta){
  let item=btn.closest(".item");
  let loadInput=item.querySelector(".load");

  let v=Number(loadInput.value);
  v+=delta;
  if(v<0)v=0;

  loadInput.value=v;
  update(item);
}

/////////////////////
// 判定更新
/////////////////////
function update(item){
  let need=Number(item.querySelector(".need").value);
  let load=Number(item.querySelector(".load").value);
  let check=item.querySelector(".check");

  if(load>=need && need>0){
    check.checked=true;
    item.classList.add("done");
  } else {
    check.checked=false;
    item.classList.remove("done");
  }

  autoSave();
}

/////////////////////
// 書き出し（必要数のみ）
/////////////////////
function exportText() {
  let lines = [];
  document.querySelectorAll(".item").forEach(item => {
    let name = item.querySelector(".name").innerText.trim();
    let need = item.querySelector(".need").value;
    lines.push(`${name}${need}`);
  });
  let text = lines.join("\n");
  prompt("コピーしてください", text);
}

/////////////////////
// 読み込み
/////////////////////
function importText() {
  let text = prompt("貼り付けてください");
  if (!text) return;

  document.getElementById("list").innerHTML = "";

  // 文字＋数字の連続パターンを全て抽出
  let regex = /([^\d]+)(\d+)/g;
  let match;
  while ((match = regex.exec(text)) !== null) {
    let name = match[1].trim();
    let need = Number(match[2]);
    createItem(name, need, 0);
  }
}

/////////////////////
// オートセーブ
/////////////////////
function autoSave(){
  let items=[];
  document.querySelectorAll(".item").forEach(item=>{
    let name = item.querySelector(".name").innerText.trim();
    let need = Number(item.querySelector(".need").value);
    let load = Number(item.querySelector(".load").value);
    items.push({name, need, load});
  });
  localStorage.setItem("tumiList", JSON.stringify(items));
}

/////////////////////
// オートロード
/////////////////////
function loadFromBrowser(){
  let data = JSON.parse(localStorage.getItem("tumiList") || "[]");
  data.forEach(d=>{
    createItem(d.name, d.need, d.load);
  });
}
window.onload = loadFromBrowser;

/////////////////////
// ドラッグイベント（上下両対応）
/////////////////////
function handleDragStart(e){
  draggedItem = this;
  this.classList.add("dragging");
  e.dataTransfer.effectAllowed = "move";
}

function handleDragOver(e){
  e.preventDefault();
  return false;
}

function handleDrop(e){
  e.stopPropagation();
  if(draggedItem !== this){
    let list = this.parentNode;
    let children = [...list.children];
    if(children.indexOf(draggedItem) < children.indexOf(this)){
      list.insertBefore(draggedItem, this.nextSibling);
    } else {
      list.insertBefore(draggedItem, this);
    }
    autoSave();
  }
  return false;
}

function handleDragEnd(e){
  this.classList.remove("dragging");
  draggedItem = null;
}

/////////////////////
// 検索機能（スクロール＋強調）
/////////////////////
function searchItem(){
  let query = document.getElementById("searchInput").value.trim();
  if(!query) return;

  let items = document.querySelectorAll(".item");
  for(let item of items){
    let name = item.querySelector(".name").innerText;
    if(name.includes(query)){
      item.scrollIntoView({behavior:"smooth", block:"start"});
      item.style.background = "#ffff99"; // 強調表示
      setTimeout(()=>item.style.background="white", 1000);
      break;
    }
  }
}
</script>

</body>
</html>
