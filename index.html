<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>歴史年表GIS</title>

<style>

body{
margin:0;
font-family:sans-serif;
display:flex;
height:100vh;
}

/* ===== 左：年表 ===== */

#left{
width:60%;
overflow-y:auto;
background:#f5f5f5;
padding:20px;
}

#timeline{
position:relative;
border-left:4px solid black;
margin-left:40px;
}

.event{
position:absolute;
background:white;
padding:10px;
border-radius:6px;
box-shadow:0 0 6px #aaa;
cursor:pointer;
width:320px;
}

.event:hover{
background:#e3f2fd;
}

/* ===== 右：地図 ===== */

#right{
width:40%;
background:white;
padding:10px;
overflow:auto;
}

svg path{
fill:#ddd;
stroke:#333;
cursor:pointer;
}

</style>
</head>

<body>

<!-- ================= 年表 ================= -->

<div id="left">

<h2>年表</h2>

<input id="yearInput" placeholder="年（例：1600 / -300）">
<input id="titleInput" placeholder="出来事">
<input id="placeInput" placeholder="場所">

<button onclick="addEvent()">追加</button>

<br><br>

<button onclick="setMode('normal')">通常</button>
<button onclick="setMode('scale')">年代比例</button>

<br><br>

<h3>年代スライダー</h3>

<input type="range"
id="timeSlider"
min="-1000"
max="2025"
value="1600"
oninput="updateTime()">

<span id="timeLabel"></span>

<div id="timeline"></div>

</div>

<!-- ================= 地図 ================= -->

<div id="japanMap">

<svg viewBox="0 0 300 500" width="320">

<!-- 北海道 -->
<path d="M180 20 L230 30 L240 70 L190 80 L170 50 Z"
fill="#ddd" onclick="selectPref('北海道')"/>

<!-- 東北 -->
<path d="M170 90 L230 100 L240 160 L180 170 L160 130 Z"
fill="#ddd" onclick="selectPref('東北')"/>

<!-- 関東 -->
<path d="M170 180 L220 190 L220 240 L170 250 L150 210 Z"
fill="#ddd" onclick="selectPref('東京')"/>

<!-- 中部 -->
<path d="M140 240 L170 230 L190 270 L160 310 L130 290 Z"
fill="#ddd" onclick="selectPref('名古屋')"/>

<!-- 近畿 -->
<path d="M120 300 L160 310 L160 350 L120 360 L100 330 Z"
fill="#ddd" onclick="selectPref('大阪')"/>

<!-- 中国 -->
<path d="M80 320 L120 330 L120 370 L80 380 L60 350 Z"
fill="#ddd" onclick="selectPref('広島')"/>

<!-- 四国 -->
<path d="M130 360 L160 370 L150 400 L120 400 Z"
fill="#ddd" onclick="selectPref('四国')"/>

<!-- 九州 -->
<path d="M70 400 L110 410 L120 470 L80 480 L60 440 Z"
fill="#ddd" onclick="selectPref('福岡')"/>

</svg>

</div>

</div>

<script>

/* ================= データ ================= */

let events=[]
let mode="normal"
let currentYear=1600

/* ================= 元号 ================= */

function gengou(y){

if(y>=2019)return"令和"
if(y>=1989)return"平成"
if(y>=1926)return"昭和"
if(y>=1912)return"大正"
if(y>=1868)return"明治"
if(y>=1603)return"江戸"
if(y>=1467)return"戦国"
if(y>=794)return"平安"
if(y>=710)return"奈良"
if(y>=538)return"飛鳥"
if(y>=250)return"古墳"
if(y>=-300)return"弥生"
return"縄文"
}

/* ================= 年表追加 ================= */

function addEvent(){

const year=parseInt(yearInput.value)

if(isNaN(year)){
alert("年を入力")
return
}

events.push({
year,
title:titleInput.value||"(なし)",
place:placeInput.value||""
})

yearInput.value=""
titleInput.value=""
placeInput.value=""

render()
}

/* ================= 表示モード ================= */

function setMode(m){
mode=m
render()
}

/* ================= 年表描画 ================= */

function render(){

const tl=document.getElementById("timeline")
tl.innerHTML=""

if(events.length===0)return

events.sort((a,b)=>a.year-b.year)

let min=events[0].year
let max=events[events.length-1].year

events.forEach((e,i)=>{

let y

if(mode==="normal"){
y=i*110
}else{
y=(e.year-min)/(max-min||1)*2000
}

const div=document.createElement("div")
div.className="event"
div.style.top=y+"px"

div.innerHTML=
`<b>${gengou(e.year)} ${e.year}年</b><br>
${e.title}<br>📍${e.place}`

div.onclick=()=>{
currentYear=e.year
timeSlider.value=e.year
updateTime()
highlightPref(e.place)
}

tl.appendChild(div)

})

tl.style.height="2100px"
}

/* ================= 地図クリック ================= */

function selectPref(name){

placeInput.value=name
highlightPref(name)
}

/* ================= ハイライト ================= */

function highlightPref(name){

document.querySelectorAll("svg rect")
.forEach(r=>r.setAttribute("fill","#ddd"))

const map={
"北海道":0,
"東北":1,
"東京":2,
"名古屋":3,
"大阪":4,
"広島":5,
"四国":6,
"福岡":7
}

const rect=document.querySelectorAll("svg rect")[map[name]]

if(rect)rect.setAttribute("fill","red")
}

/* ================= 時代分類 ================= */

function getEra(y){

if(y>=1868)return"modern"
if(y>=1600)return"edo"
if(y>=1467)return"sengoku"
if(y>=794)return"heian"
return"ancient"
}

/* ================= スライダー ================= */

function updateTime(){

currentYear=Number(timeSlider.value)

timeLabel.textContent=
gengou(currentYear)+" "+currentYear+"年"

updateMapByTime()
}

/* ================= 地図色変更 ================= */

function updateMapByTime(){

const era=getEra(currentYear)

document.querySelectorAll("svg rect")
.forEach(r=>{

switch(era){

case"modern":
r.setAttribute("fill","#90caf9")
break

case"edo":
r.setAttribute("fill","#a5d6a7")
break

case"sengoku":
r.setAttribute("fill","#ffcc80")
break

case"heian":
r.setAttribute("fill","#ce93d8")
break

default:
r.setAttribute("fill","#eee")

}

})
}

updateTime()

</script>

</body>
</html>
