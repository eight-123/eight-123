<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>学習OS（歴史・理科・数学）</title>

<style>
body{
  font-family: sans-serif;
  padding: 20px;
}

/* タブ */
.tabs{
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

.tab{
  padding:8px 12px;
  border:1px solid #333;
  border-radius:6px;
  cursor:pointer;
  background:#eee;
}

.tab.active{
  background:#333;
  color:white;
}

/* ページ */
.page{ display:none; }
.page.active{ display:block; }

/* ===================== */
/* 歴史（そのまま） */
/* ===================== */
#timeline{
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding:10px;
  border-top:2px solid #333;
  margin-top:20px;
}

.card{
  min-width:240px;
  border:1px solid #aaa;
  border-radius:10px;
  padding:10px;
  background:#f7f7f7;
  flex-shrink:0;
}

.year{ font-weight:bold; font-size:18px; }
.era{ font-size:12px; color:#666; }
.category{ font-size:12px; color:#0077cc; }

button.small{ font-size:12px; margin-top:5px; }

/* ===================== */
/* 理科（ページ式ノート） */
/* ===================== */
#canvas{
  border:1px solid #ccc;
  width:100%;
  height:500px;
  background:white;
  touch-action:none;
}

/* ===================== */
/* 数学 */
/* ===================== */
.math-card{
  border:1px solid #aaa;
  border-radius:10px;
  padding:10px;
  margin:5px 0;
  background:#f7f7f7;
}
</style>
</head>

<body>

<h2>📚 学習OS</h2>

<div class="tabs">
  <div class="tab active" onclick="switchTab('history')">歴史</div>
  <div class="tab" onclick="switchTab('science')">理科</div>
  <div class="tab" onclick="switchTab('math')">数学</div>
</div>

<!-- ===================== -->
<!-- 歴史（そのまま） -->
<!-- ===================== -->
<div id="history" class="page active">

<h3>📚 歴史タイムライン</h3>

<input id="year" type="number" placeholder="西暦">
<input id="text" type="text" placeholder="出来事">
<input id="category" type="text" placeholder="分類">
<button onclick="addEvent()">追加</button>

<div id="timeline"></div>
</div>

<!-- ===================== -->
<!-- 理科（ページ式ペンノート） -->
<!-- ===================== -->
<div id="science" class="page">

<h3>🧪 理科ノート（ページ式手書き）</h3>

<div style="margin-bottom:10px;">
  <button onclick="addPage()">＋ページ</button>
  <button onclick="prevPage()">←</button>
  <button onclick="nextPage()">→</button>
  <span id="pageInfo"></span>
</div>

<canvas id="canvas"></canvas>

</div>

<!-- ===================== -->
<!-- 数学（そのまま） -->
<!-- ===================== -->
<div id="math" class="page">

<h3>➗ 数学ノート</h3>

<input id="m_cat" placeholder="カテゴリ">
<input id="m_title" placeholder="公式">
<input id="m_text" placeholder="説明">
<button onclick="addMath()">追加</button>

<div id="mathList"></div>
</div>

<script>

// =====================
// タブ
// =====================
function switchTab(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  event.target.classList.add("active");
}

// =====================
// 歴史（そのまま）
// =====================
const eras=[
  {name:"令和",start:2019},
  {name:"平成",start:1989},
  {name:"昭和",start:1926},
  {name:"大正",start:1912},
  {name:"明治",start:1868},
  {name:"宝永",start:1704},
  {name:"元禄",start:1688},
  {name:"江戸",start:1603},
  {name:"室町",start:1336},
  {name:"鎌倉",start:1185},
  {name:"平安",start:794}
];

function toEra(y){
  for(let i=0;i<eras.length;i++){
    if(y>=eras[i].start){
      return eras[i].name+(y-eras[i].start+1)+"年";
    }
  }
  return "不明";
}

let data=JSON.parse(localStorage.getItem("timeline")||"[]");

function addEvent(){
  const y=+year.value;
  const t=text.value;
  const c=category.value;

  if(!y||!t)return;

  data.push({year:y,text:t,category:c});
  localStorage.setItem("timeline",JSON.stringify(data));
  renderHistory();

  year.value=text.value=category.value="";
}

function renderHistory(){
  const tl=document.getElementById("timeline");
  tl.innerHTML="";

  data.sort((a,b)=>a.year-b.year);

  data.forEach(d=>{
    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <div class="year">${d.year}</div>
      <div class="era">${toEra(d.year)}</div>
      <div class="category">${d.category||""}</div>
      <div>${d.text}</div>
    `;

    tl.appendChild(div);
  });
}

renderHistory();

// =====================
// 理科（ページ式手書きノート）
// =====================
let pages = JSON.parse(localStorage.getItem("science_pages") || "[]");
let pageIndex = 0;

let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let drawing = false;

// 初期ページ
if(pages.length === 0){
  pages.push("");
}

resize();
loadPage();

// サイズ調整
function resize(){
  canvas.width = canvas.offsetWidth;
  canvas.height = 500;
}
window.onresize = resize;

// =====================
// ページ管理
// =====================
function addPage(){
  pages.push("");
  pageIndex = pages.length - 1;
  savePages();
  loadPage();
}

function prevPage(){
  if(pageIndex > 0){
    pageIndex--;
    loadPage();
  }
}

function nextPage(){
  if(pageIndex < pages.length - 1){
    pageIndex++;
    loadPage();
  }
}

// =====================
// 保存
// =====================
function savePages(){
  pages[pageIndex] = canvas.toDataURL();
  localStorage.setItem("science_pages", JSON.stringify(pages));

  document.getElementById("pageInfo").innerText =
    `${pageIndex+1} / ${pages.length}`;
}

// =====================
// 読み込み
// =====================
function loadPage(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  let img = new Image();

  img.onload = () => ctx.drawImage(img,0,0);

  img.src = pages[pageIndex] || "";

  document.getElementById("pageInfo").innerText =
    `${pageIndex+1} / ${pages.length}`;
}

// =====================
// 描画
// =====================
canvas.addEventListener("mousedown", start);
canvas.addEventListener("touchstart", start);

function start(e){
  drawing = true;
  draw(e);
}

canvas.addEventListener("mouseup", stop);
canvas.addEventListener("touchend", stop);

function stop(){
  drawing = false;
  ctx.beginPath();
  savePages();
}

canvas.addEventListener("mousemove", draw);
canvas.addEventListener("touchmove", draw);

function draw(e){
  if(!drawing) return;

  let x = e.touches ? e.touches[0].clientX : e.clientX;
  let y = e.touches ? e.touches[0].clientY : e.clientY;

  let rect = canvas.getBoundingClientRect();

  x -= rect.left;
  y -= rect.top;

  ctx.globalCompositeOperation = "source-over";
  ctx.strokeStyle = "black";
  ctx.lineWidth = 2;

  ctx.lineTo(x,y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x,y);
}

// =====================
// 数学（そのまま）
// =====================
let math=JSON.parse(localStorage.getItem("math")||"[]");

function addMath(){
  math.push({
    c:m_cat.value,
    t:m_title.value,
    d:m_text.value
  });

  localStorage.setItem("math",JSON.stringify(math));
  renderMath();

  m_cat.value=m_title.value=m_text.value="";
}

function renderMath(){
  const el=document.getElementById("mathList");
  el.innerHTML="";

  const g={};

  math.forEach((m,i)=>{
    if(!g[m.c])g[m.c]=[];
    g[m.c].push(m);
  });

  for(const c in g){
    const div=document.createElement("div");
    div.className="math-card";
    div.innerHTML=`<b>${c}</b><br>`;

    g[c].forEach(m=>{
      div.innerHTML+=`➗ ${m.t}<br>${m.d}<br><br>`;
    });

    el.appendChild(div);
  }
}

renderMath();

</script>

</body>
</html>
