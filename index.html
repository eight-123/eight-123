<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>学習OS</title>

<style>
body{
  font-family: sans-serif;
  padding: 20px;
}

/* タブ */
.tabs{
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

.tab{
  padding: 8px 12px;
  border: 1px solid #333;
  border-radius: 6px;
  cursor: pointer;
  background: #eee;
}

.tab.active{
  background: #333;
  color: white;
}

/* ページ */
.page{
  display: none;
}

.page.active{
  display: block;
}

/* カード */
.card{
  border: 1px solid #aaa;
  border-radius: 10px;
  padding: 10px;
  margin: 5px 0;
  background: #f7f7f7;
}

/* 社会 */
#timeline{
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding: 10px;
  border-top: 2px solid #333;
}

.timeline-card{
  min-width: 220px;
  border: 1px solid #aaa;
  border-radius: 10px;
  padding: 10px;
  background: #f7f7f7;
  flex-shrink: 0;
}

/* ツリー（理科） */
.tree{
  margin-left: 20px;
  border-left: 2px solid #aaa;
  padding-left: 10px;
}
</style>
</head>

<body>

<h2>📚 学習OS（社会・理科・数学）</h2>

<!-- タブ -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('social')">社会</div>
  <div class="tab" onclick="switchTab('science')">理科</div>
  <div class="tab" onclick="switchTab('math')">数学</div>
</div>

<!-- ===================== -->
<!-- 社会（年表） -->
<!-- ===================== -->
<div id="social" class="page active">

<h3>📖 社会（年表）</h3>

<input id="s_year" type="number" placeholder="西暦">
<input id="s_text" type="text" placeholder="出来事">
<button onclick="addSocial()">追加</button>

<div id="timeline"></div>
</div>

<!-- ===================== -->
<!-- 理科（マインドマップ） -->
<!-- ===================== -->
<div id="science" class="page">

<h3>🧪 理科（マインドマップ）</h3>

<input id="sc_title" placeholder="テーマ">
<input id="sc_parent" placeholder="親（なければ空）">
<input id="sc_text" placeholder="内容">
<button onclick="addScience()">追加</button>

<div id="scienceList"></div>
</div>

<!-- ===================== -->
<!-- 数学（公式） -->
<!-- ===================== -->
<div id="math" class="page">

<h3>➗ 数学（公式大全）</h3>

<input id="m_cat" placeholder="カテゴリ（例：図形）">
<input id="m_title" placeholder="公式名">
<input id="m_text" placeholder="内容">
<button onclick="addMath()">追加</button>

<div id="mathList"></div>
</div>

<script>
// =====================
// タブ切替
// =====================
function switchTab(id){
  document.querySelectorAll(".page").forEach(p=>{
    p.classList.remove("active");
  });
  document.querySelectorAll(".tab").forEach(t=>{
    t.classList.remove("active");
  });

  document.getElementById(id).classList.add("active");
  event.target.classList.add("active");
}

// =====================
// データ
// =====================
let social = JSON.parse(localStorage.getItem("social") || "[]");
let science = JSON.parse(localStorage.getItem("science") || "[]");
let math = JSON.parse(localStorage.getItem("math") || "[]");

// =====================
// 社会
// =====================
function addSocial(){
  const y = parseInt(document.getElementById("s_year").value);
  const t = document.getElementById("s_text").value;

  if(!y || !t) return;

  social.push({y,t});
  social.sort((a,b)=>a.y-b.y);

  localStorage.setItem("social", JSON.stringify(social));
  renderSocial();
}

function renderSocial(){
  const el = document.getElementById("timeline");
  el.innerHTML = "";

  social.forEach(d=>{
    const div = document.createElement("div");
    div.className = "timeline-card";
    div.innerHTML = `<b>${d.y}</b><br>${d.t}`;
    el.appendChild(div);
  });
}

// =====================
// 理科（ツリー構造）
// =====================
function addScience(){
  const title = document.getElementById("sc_title").value;
  const parent = document.getElementById("sc_parent").value;
  const text = document.getElementById("sc_text").value;

  science.push({title,parent,text});
  localStorage.setItem("science", JSON.stringify(science));
  renderScience();
}

function renderScience(){
  const el = document.getElementById("scienceList");
  el.innerHTML = "";

  science.forEach(d=>{
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>${d.title}</b><br>
      ${d.parent ? "↳ "+d.parent+"<br>" : ""}
      ${d.text}
    `;

    el.appendChild(div);
  });
}

// =====================
// 数学
// =====================
function addMath(){
  const cat = document.getElementById("m_cat").value;
  const title = document.getElementById("m_title").value;
  const text = document.getElementById("m_text").value;

  math.push({cat,title,text});
  localStorage.setItem("math", JSON.stringify(math));
  renderMath();
}

function renderMath(){
  const el = document.getElementById("mathList");
  el.innerHTML = "";

  math.forEach(d=>{
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>[${d.cat}] ${d.title}</b><br>
      ${d.text}
    `;

    el.appendChild(div);
  });
}

// 初期表示
renderSocial();
renderScience();
renderMath();
</script>

</body>
</html>
