<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TD4 Logic Simulator</title>

<style>
body{margin:0;background:#111;color:white;font-family:sans-serif}
#toolbar{background:#222;padding:6px}
button{margin:2px}
canvas{display:block;background:#111}
</style>
</head>

<body>

<div id="toolbar">
<button onclick="addGate('INPUT')">INPUT</button>
<button onclick="addGate('CLOCK')">CLOCK</button>
<button onclick="addGate('AND')">AND</button>
<button onclick="addGate('OR')">OR</button>
<button onclick="addGate('NOT')">NOT</button>
<button onclick="addGate('DFF')">D-FF</button>
<button onclick="addGate('ROM')">ROM(DIP)</button>
<button onclick="addGate('LED')">LED</button>
<button onclick="running=!running">RUN</button>
</div>

<canvas id="cv"></canvas>

<script>

const cv=document.getElementById("cv")
const ctx=cv.getContext("2d")

function resize(){
cv.width=innerWidth
cv.height=innerHeight-40
}
resize()
onresize=resize

let gates=[]
let wires=[]
let running=false
let connectFrom=null

//================
// Gate
//================

class Gate{

constructor(type,x,y){
this.type=type
this.x=x
this.y=y
this.output=0
this.inputs=[0,0]
this.state=0

// ROM DIP
if(type==="ROM"){
this.dip=new Array(8).fill(0)
}
}

outputPos(){
return {x:this.x+70,y:this.y+20}
}

inputPos(i){
return {x:this.x-10,y:this.y+10+i20}
}

draw(){

ctx.fillStyle="#333"
ctx.fillRect(this.x,this.y,70,40)

ctx.fillStyle="white"
ctx.fillText(this.type,this.x+5,this.y+15)

// inputs
for(let i=0;i<2;i++){
let p=this.inputPos(i)
ctx.fillStyle=this.inputs[i]?"red":"blue"
ctx.beginPath()
ctx.arc(p.x,p.y,5,0,Math.PI2)
ctx.fill()
}

// output
let o=this.outputPos()
ctx.fillStyle=this.output?"red":"blue"
ctx.beginPath()
ctx.arc(o.x,o.y,5,0,Math.PI2)
ctx.fill()

// DIP switches
if(this.type==="ROM"){
for(let i=0;i<8;i++){
ctx.fillStyle=this.dip[i]?"lime":"#555"
ctx.fillRect(this.x+i8,this.y+45,6,12)
}
}
}
}

//================
// Add gate
//================

function addGate(t){
gates.push(new Gate(t,100,100))
}

//================
// Mouse
//================

cv.onclick=e=>{

let x=e.offsetX,y=e.offsetY

for(let g of gates){

// OUTPUT click
let o=g.outputPos()
if(dist(x,y,o.x,o.y)<8){

connectFrom=g
return
}

// INPUT click
for(let i=0;i<2;i++){
let p=g.inputPos(i)
if(dist(x,y,p.x,p.y)<8 && connectFrom){

wires.push({
from:connectFrom,
to:g,
input:i
})

connectFrom=null
return
}
}

// DIP switch click
if(g.type==="ROM"){
for(let i=0;i<8;i++){
let dx=g.x+i*8
let dy=g.y+45
if(x>dx && x<dx+6 && y>dy && y<dy+12){
g.dip[i]^=1
}
}
}

}

}

function dist(x1,y1,x2,y2){
return Math.hypot(x1-x2,y1-y2)
}

//================
// Logic
//================

function step(){

gates.forEach(g=>{

switch(g.type){

case"INPUT":
g.output=g.state
break

case"CLOCK":
g.state^=1
g.output=g.state
break

case"AND":
g.output=g.inputs[0]&g.inputs[1]
break

case"OR":
g.output=g.inputs[0]|g.inputs[1]
break

case"NOT":
g.output=!g.inputs[0]
break

case"DFF":
if(g.inputs[1]) g.state=g.inputs[0]
g.output=g.state
break

case"ROM":
let v=0
for(let i=0;i<8;i++)
v|=g.dip[i]<<i
g.output=v&1
break

case"LED":
g.output=g.inputs[0]
break

}

})

// propagate wires
wires.forEach(w=>{
w.to.inputs[w.input]=w.from.output
})

}

//================
// Draw
//================

function draw(){

ctx.clearRect(0,0,cv.width,cv.height)

// wires
wires.forEach(w=>{
let a=w.from.outputPos()
let b=w.to.inputPos(w.input)

ctx.strokeStyle=w.from.output?"red":"blue"
ctx.beginPath()
ctx.moveTo(a.x,a.y)
ctx.lineTo(b.x,b.y)
ctx.stroke()
})

gates.forEach(g=>g.draw())

}

//================
// Loop
//================

function loop(){

if(running) step()

draw()
requestAnimationFrame(loop)
}

loop()

</script>

</body>
</html>
