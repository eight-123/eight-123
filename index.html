<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>年表ツール</title>

<link rel="stylesheet"
 href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
  margin:0;
  font-family:sans-serif;
  display:flex;
  height:100vh;
}

#left{
  width:60%;
  overflow-y:auto;
  background:#f5f5f5;
  padding:20px;
}

#timeline{
  position:relative;
  border-left:4px solid black;
  margin-left:40px;
}

.event{
  position:absolute;
  background:white;
  padding:8px;
  border-radius:6px;
  box-shadow:0 0 5px #aaa;
  cursor:pointer;
  width:300px;
}

#right{
  width:40%;
  display:flex;
  flex-direction:column;
}

#map{flex:1;}
</style>
</head>

<body>

<!-- ===== 左 ===== -->

<div id="left">

<h2>年表</h2>

<input id="yearInput" placeholder="年（1600 / -300）">
<input id="titleInput" placeholder="出来事">
<input id="placeInput" placeholder="場所">
<button onclick="addEvent()">追加</button>

<br>

<button onclick="setMode('normal')">通常表示</button>
<button onclick="setMode('scale')">年代比例</button>

<div id="timeline"></div>

</div>

<!-- ===== 右 ===== -->

<div id="right">

<h3>地図</h3>

<input id="mapSearch">
<button onclick="searchPlace()">検索</button>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

/* ========= データ ========= */

let events=[]
let mode="normal"

/* ========= 地図 ========= */

const map=L.map('map').setView([35,135],5)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map)

let marker=null

/* ========= 年号 ========= */

function gengou(y){

if(y>=2019)return"令和"
if(y>=1989)return"平成"
if(y>=1926)return"昭和"
if(y>=1912)return"大正"
if(y>=1868)return"明治"
if(y>=1603)return"江戸"
if(y>=1336)return"室町"
if(y>=1185)return"鎌倉"
if(y>=794)return"平安"
if(y>=710)return"奈良"
if(y>=538)return"飛鳥"
if(y>=250)return"古墳"
if(y>=-300)return"弥生"
return"縄文"
}

/* ========= 追加 ========= */

function addEvent(){

const yearEl=document.getElementById("yearInput")
const titleEl=document.getElementById("titleInput")
const placeEl=document.getElementById("placeInput")

const year=parseInt(yearEl.value)

if(isNaN(year)){
alert("年を入れて！")
return
}

events.push({
year,
title:titleEl.value||"(タイトルなし)",
place:placeEl.value||""
})

yearEl.value=""
titleEl.value=""
placeEl.value=""

render()
}

/* ========= モード ========= */

function setMode(m){
mode=m
render()
}

/* ========= 描画 ========= */

function render(){

const tl=document.getElementById("timeline")
tl.innerHTML=""

if(events.length===0)return

events.sort((a,b)=>a.year-b.year)

let min=events[0].year
let max=events[events.length-1].year

events.forEach((e,i)=>{

let y

if(mode==="normal"){
y=i*100
}else{
y=(e.year-min)/(max-min||1)*2000
}

const div=document.createElement("div")
div.className="event"
div.style.top=y+"px"

div.innerHTML=
`<b>${gengou(e.year)} ${e.year}年</b><br>
${e.title}<br>📍${e.place}`

div.onclick=()=>jumpMap(e.place)

tl.appendChild(div)
})

tl.style.height="2100px"
}

/* ========= 地図ジャンプ ========= */

async function jumpMap(place){

if(!place)return

const res=await fetch(
`https://nominatim.openstreetmap.org/search?format=json&q=${place}`
)

const data=await res.json()

if(!data.length){
alert("場所見つからない")
return
}

const lat=data[0].lat
const lon=data[0].lon

map.setView([lat,lon],6)

if(marker)map.removeLayer(marker)

marker=L.marker([lat,lon]).addTo(map)
}

/* ========= 検索 ========= */

function searchPlace(){
jumpMap(document.getElementById("mapSearch").value)
}

</script>
</body>
</html>
