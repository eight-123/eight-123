<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Logic Simulator</title>

<style>
body{margin:0;background:#111;color:white;font-family:sans-serif}
#bar{background:#222;padding:6px}
button{margin:2px}
canvas{display:block}
</style>
</head>

<body>

<div id="bar">
<button onclick="addGate('INPUT')">INPUT</button>
<button onclick="addGate('LED')">LED</button>
<button onclick="addGate('NOT')">NOT</button>
<button onclick="addGate('AND')">AND</button>
<button onclick="addGate('CLOCK')">CLOCK</button>
<button onclick="running=!running">RUN</button>
</div>

<canvas id="cv"></canvas>

<script>

const cv=document.getElementById("cv")
const ctx=cv.getContext("2d")

function resize(){
cv.width=innerWidth
cv.height=innerHeight-40
}
resize()
window.onresize=resize

let gates=[]
let wires=[]
let running=false
let connect=null

//================ GATE =================

class Gate{
constructor(type,x,y){
this.type=type
this.x=x
this.y=y
this.inputs=[0,0]
this.output=0
this.state=0
}

out(){return {x:this.x+60,y:this.y+20}}
inp(i){return {x:this.x,y:this.y+10+i*20}}

draw(){

// body
ctx.fillStyle="#333"
ctx.fillRect(this.x,this.y,60,40)

ctx.fillStyle="white"
ctx.fillText(this.type,this.x+5,this.y+15)

// inputs
for(let i=0;i<2;i++){
let p=this.inp(i)
ctx.fillStyle=this.inputs[i]?"red":"blue"
ctx.beginPath()
ctx.arc(p.x,p.y,5,0,6.28)
ctx.fill()
}

// output
let o=this.out()
ctx.fillStyle=this.output?"red":"blue"
ctx.beginPath()
ctx.arc(o.x,o.y,5,0,6.28)
ctx.fill()

// LED表示
if(this.type==="LED"){
ctx.fillStyle=this.output?"red":"#222"
ctx.beginPath()
ctx.arc(this.x+30,this.y+25,10,0,6.28)
ctx.fill()
}
}
}

//================ ADD =================

function addGate(t){
gates.push(new Gate(t,150+Math.random()*200,120))
}

//================ CLICK =================

cv.onclick=e=>{

let x=e.offsetX
let y=e.offsetY

for(let g of gates){

// INPUT toggle
if(g.type==="INPUT"){
if(hit(x,y,g.x,g.y,60,40)){
g.state^=1
return
}
}

// output click
let o=g.out()
if(dist(x,y,o.x,o.y)<8){
connect=g
return
}

// input click
for(let i=0;i<2;i++){
let p=g.inp(i)
if(dist(x,y,p.x,p.y)<8 && connect){
wires.push({from:connect,to:g,index:i})
connect=null
return
}
}

}

}

function hit(x,y,rx,ry,w,h){
return x>rx&&x<rx+w&&y>ry&&y<ry+h
}

function dist(x1,y1,x2,y2){
return Math.hypot(x1-x2,y1-y2)
}

//================ LOGIC =================

function evaluate(){

// 1. 初期化
gates.forEach(g=>g.inputs=[0,0])

// 2. ワイヤ伝搬
wires.forEach(w=>{
w.to.inputs[w.index]=w.from.output
})

// 3. ゲート計算
gates.forEach(g=>{

switch(g.type){

case"INPUT":
g.output=g.state
break

case"CLOCK":
g.state^=1
g.output=g.state
break

case"NOT":
g.output=g.inputs[0]?0:1
break

case"AND":
g.output=g.inputs[0]&g.inputs[1]
break

case"LED":
g.output=g.inputs[0]
break

}

})

}

//================ DRAW =================

function draw(){

ctx.clearRect(0,0,cv.width,cv.height)

// wires
wires.forEach(w=>{
let a=w.from.out()
let b=w.to.inp(w.index)

ctx.strokeStyle=w.from.output?"red":"blue"
ctx.beginPath()
ctx.moveTo(a.x,a.y)
ctx.lineTo(b.x,b.y)
ctx.stroke()
})

gates.forEach(g=>g.draw())
}

//================ LOOP =================

function loop(){

if(running) evaluate()

draw()
requestAnimationFrame(loop)
}

loop()

</script>
</body>
</html>
