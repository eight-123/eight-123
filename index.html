<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>年表ツール</title>

<style>

body{
  font-family:sans-serif;
  padding:20px;
}

button,input{
  margin:5px;
}

/* ===== 通常表示 ===== */

.normal .item{
  position:relative;
  margin:15px 0;
  padding-left:20px;
  border-left:3px solid black;
}

/* ===== 比例表示 ===== */

.scale{
  position:relative;
  height:1400px;
  border-left:4px solid black;
  margin-left:50%;
}

.scale .item{
  position:absolute;
  transform:translateX(-50%);
  width:280px;
  background:#f5f5f5;
  padding:10px;
  border-radius:10px;
}

.year{
  font-weight:bold;
}

.mode{
  margin-bottom:10px;
}

</style>
</head>

<body>

<h2>年表ツール</h2>

<div class="mode">
<button onclick="setMode('normal')">通常表示</button>
<button onclick="setMode('scale')">年代比例表示</button>
</div>

年：
<input id="year" type="number">

出来事：
<input id="event" type="text">

<button id="addBtn">追加</button>

<div id="timeline"></div>

<script>

// ======================
// 元号データ
// ======================

const eras=[
{ name:"令和", start:2019 },
{ name:"平成", start:1989 },
{ name:"昭和", start:1926 },
{ name:"大正", start:1912 },
{ name:"明治", start:1868 }
];

// 元号変換
function getEra(year){

  for(const era of eras){
    if(year>=era.start){
      const n=year-era.start+1;
      return `${era.name}${n===1?"元":n}年`;
    }
  }
  return "";
}

// ======================

const yearInput=document.getElementById("year");
const eventInput=document.getElementById("event");
const timeline=document.getElementById("timeline");

let mode=localStorage.getItem("mode")||"normal";

let data=JSON.parse(localStorage.getItem("timeline"))||[];

draw();

document.getElementById("addBtn")
.addEventListener("click",addEvent);


// ======================
// モード切替
// ======================

function setMode(m){
  mode=m;
  localStorage.setItem("mode",m);
  draw();
}


// ======================
// 追加
// ======================

function addEvent(){

  const year=Number(yearInput.value);
  const event=eventInput.value.trim();

  if(!year||!event)return;

  data.push({
    id:Date.now(),
    year,
    event
  });

  save();
  draw();

  yearInput.value="";
  eventInput.value="";
}


// ======================

function save(){
  localStorage.setItem("timeline",JSON.stringify(data));
}


// ======================
// 描画（核心）
// ======================

function draw(){

  timeline.className="";
  timeline.innerHTML="";

  if(data.length===0)return;

  data.sort((a,b)=>a.year-b.year);

  timeline.classList.add(mode);

  // ===== 通常表示 =====
  if(mode==="normal"){

    data.forEach(item=>{

      const div=document.createElement("div");
      div.className="item";

      div.innerHTML=`
        <div class="year">
          ${item.year}年（${getEra(item.year)}）
        </div>
        <div>${item.event}</div>
      `;

      timeline.appendChild(div);
    });
  }

  // ===== 比例表示 =====
  if(mode==="scale"){

    const min=data[0].year;
    const max=data[data.length-1].year;
    const range=max-min||1;

    const scale=1200/range;

    data.forEach(item=>{

      const y=(item.year-min)*scale;

      const div=document.createElement("div");
      div.className="item";
      div.style.top=y+"px";

      div.innerHTML=`
        <div class="year">
          ${item.year}年（${getEra(item.year)}）
        </div>
        <div>${item.event}</div>
      `;

      timeline.appendChild(div);
    });
  }
}

</script>

</body>
</html>
