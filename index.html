<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>年表ツール（安全版）</title>

<style>
body{
margin:0;
font-family:sans-serif;
display:flex;
height:100vh;
}

/* ===== 年表 ===== */

#left{
width:65%;
overflow-y:auto;
background:#f5f5f5;
padding:20px;
}

#timeline{
position:relative;
border-left:4px solid black;
margin-left:40px;
}

.event{
position:absolute;
background:white;
padding:10px;
border-radius:6px;
box-shadow:0 0 6px #aaa;
cursor:pointer;
width:320px;
}

.event:hover{
background:#e8f2ff;
}

/* ===== 地図メニュー ===== */

#right{
width:35%;
padding:20px;
background:#ffffff;
border-left:2px solid #ddd;
}

input,button{
margin:4px;
padding:6px;
}
</style>
</head>

<body>

<!-- ========= 年表 ========= -->

<div id="left">

<h2>年表</h2>

<input id="yearInput" placeholder="年（1600 / -300）">
<input id="titleInput" placeholder="出来事">
<input id="placeInput" placeholder="場所">
<button onclick="addEvent()">追加</button>

<br>

<button onclick="setMode('normal')">通常表示</button>
<button onclick="setMode('scale')">年代比例</button>

<div id="timeline"></div>

</div>

<!-- ========= 地図 ========= -->

<div id="right">

<h3>地図メニュー</h3>

<input id="mapSearch" placeholder="地名検索">
<button onclick="searchPlace()">Google Mapsで開く</button>

<p>
※地図はGoogle Mapsを使用します<br>
（外部サービスへ移動します）
</p>

</div>

<script>

/* ===== データ ===== */

let events=[]
let mode="normal"

/* ===== 年号 ===== */

function gengou(y){

if(y>=2019)return"令和"
if(y>=1989)return"平成"
if(y>=1926)return"昭和"
if(y>=1912)return"大正"
if(y>=1868)return"明治"
if(y>=1603)return"江戸"
if(y>=1336)return"室町"
if(y>=1185)return"鎌倉"
if(y>=794)return"平安"
if(y>=710)return"奈良"
if(y>=538)return"飛鳥"
if(y>=250)return"古墳"
if(y>=-300)return"弥生"
return"縄文"
}

/* ===== 追加 ===== */

function addEvent(){

const year=parseInt(
document.getElementById("yearInput").value
)

if(isNaN(year)){
alert("年を入力して")
return
}

events.push({
year,
title:document.getElementById("titleInput").value||"(なし)",
place:document.getElementById("placeInput").value||""
})

yearInput.value=""
titleInput.value=""
placeInput.value=""

render()
}

/* ===== 表示モード ===== */

function setMode(m){
mode=m
render()
}

/* ===== 描画 ===== */

function render(){

const tl=document.getElementById("timeline")
tl.innerHTML=""

if(events.length===0)return

events.sort((a,b)=>a.year-b.year)

let min=events[0].year
let max=events[events.length-1].year

events.forEach((e,i)=>{

let y

if(mode==="normal"){
y=i*110
}else{
y=(e.year-min)/(max-min||1)*2000
}

const div=document.createElement("div")
div.className="event"
div.style.top=y+"px"

div.innerHTML=
`<b>${gengou(e.year)} ${e.year}年</b><br>
${e.title}<br>📍${e.place}`

div.onclick=()=>openMap(e.place)

tl.appendChild(div)
})

tl.style.height="2100px"
}

/* ===== Google Mapsへ ===== */

function openMap(place){

if(!place)return

const url=
"https://www.google.com/maps/search/"+encodeURIComponent(place)

window.open(url,"_blank")
}

/* ===== 検索 ===== */

function searchPlace(){
openMap(document.getElementById("mapSearch").value)
}

</script>
</body>
</html>
