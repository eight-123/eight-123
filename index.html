<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Logic Simulator</title>

<style>
body{margin:0;background:#111;color:white;font-family:sans-serif}
#bar{background:#222;padding:6px}
button{margin:2px}
canvas{display:block;background:#111}
</style>
</head>

<body>

<div id="bar">
<button onclick="add('INPUT')">INPUT</button>
<button onclick="add('CLOCK')">CLOCK</button>
<button onclick="add('AND')">AND</button>
<button onclick="add('NOT')">NOT</button>
<button onclick="add('LED')">LED</button>
<button onclick="add('ROM')">ROM(DIP)</button>
<button onclick="running=!running">RUN</button>
</div>

<canvas id="cv"></canvas>

<script>

const cv=document.getElementById("cv")
const ctx=cv.getContext("2d")

function resize(){
cv.width=innerWidth
cv.height=innerHeight-40
}
resize()
onresize=resize

let gates=[]
let wires=[]
let running=false
let connect=null

//================ Gate =================

class Gate{

constructor(type,x,y){
this.type=type
this.x=x
this.y=y
this.inputs=[0,0]
this.output=0
this.state=0

if(type==="ROM")
this.dip=new Array(8).fill(0)
}

out(){return {x:this.x+60,y:this.y+20}}
inp(i){return {x:this.x,y:this.y+10+i20}}

draw(){

ctx.fillStyle="#333"
ctx.fillRect(this.x,this.y,60,40)

ctx.fillStyle="white"
ctx.fillText(this.type,this.x+5,this.y+15)

// inputs
for(let i=0;i<2;i++){
let p=this.inp(i)
ctx.fillStyle=this.inputs[i]?"red":"blue"
ctx.beginPath()
ctx.arc(p.x,p.y,5,0,6.28)
ctx.fill()
}

// output
let o=this.out()
ctx.fillStyle=this.output?"red":"blue"
ctx.beginPath()
ctx.arc(o.x,o.y,5,0,6.28)
ctx.fill()

// ROM DIP
if(this.type==="ROM"){
for(let i=0;i<8;i++){
ctx.fillStyle=this.dip[i]?"lime":"#555"
ctx.fillRect(this.x+i7,this.y+45,6,12)
}
}
}
}

//================ add =================

function add(t){
gates.push(new Gate(t,100+Math.random()200,100))
}

//================ click =================

cv.onclick=e=>{

let x=e.offsetX
let y=e.offsetY

for(let g of gates){

// INPUT toggle
if(g.type==="INPUT"){
if(hit(x,y,g.x,g.y,60,40)){
g.state^=1
return
}
}

// OUTPUT click
let o=g.out()
if(dist(x,y,o.x,o.y)<7){
connect=g
return
}

// INPUT click
for(let i=0;i<2;i++){
let p=g.inp(i)
if(dist(x,y,p.x,p.y)<7 && connect){

wires.push({
from:connect,
to:g,
index:i
})

connect=null
return
}
}

// ROM DIP
if(g.type==="ROM"){
for(let i=0;i<8;i++){
let dx=g.x+i7
let dy=g.y+45
if(hit(x,y,dx,dy,6,12)){
g.dip[i]^=1
return
}
}
}

}

}

function hit(x,y,rx,ry,w,h){
return x>rx&&x<rx+w&&y>ry&&y<ry+h
}

function dist(x1,y1,x2,y2){
return Math.hypot(x1-x2,y1-y2)
}

//================ logic =================

function step(){

// gate logic
for(let g of gates){

switch(g.type){

case"INPUT":
g.output=g.state
break

case"CLOCK":
g.state^=1
g.output=g.state
break

case"AND":
g.output=g.inputs[0]&g.inputs[1]
break

case"NOT":
g.output=!g.inputs[0]
break

case"LED":
g.output=g.inputs[0]
break

case"ROM":
g.output=g.dip[0]
break

}

}

// wire propagation
for(let w of wires){
w.to.inputs[w.index]=w.from.output
}

}

//================ draw =================

function draw(){

ctx.clearRect(0,0,cv.width,cv.height)

// wires
for(let w of wires){

let a=w.from.out()
let b=w.to.inp(w.index)

ctx.strokeStyle=w.from.output?"red":"blue"
ctx.beginPath()
ctx.moveTo(a.x,a.y)
ctx.lineTo(b.x,b.y)
ctx.stroke()
}

// gates
gates.forEach(g=>g.draw())

}

//================ loop =================

function loop(){

if(running) step()

draw()
requestAnimationFrame(loop)
}

loop()

</script>

</body>
</html>
