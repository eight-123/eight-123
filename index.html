<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Logic Editor</title>

<style>
body{margin:0;background:#111;color:white;font-family:sans-serif}
#bar{background:#222;padding:6px}
button{margin:3px}
canvas{touch-action:none;display:block}
</style>
</head>

<body>

<div id="bar">
<button onclick="addGate('INPUT')">INPUT</button>
<button onclick="addGate('LED')">LED</button>
<button onclick="running=!running">RUN</button>
</div>

<canvas id="cv"></canvas>

<script>

const cv=document.getElementById("cv")
const ctx=cv.getContext("2d")

function resize(){
cv.width=window.innerWidth
cv.height=window.innerHeight-40
}
resize()
window.onresize=resize

//====================

let gates=[]
let wires=[]
let running=false

let dragging=null
let connectFrom=null

//====================

class Gate{

constructor(type,x,y){
this.type=type
this.x=x
this.y=y
this.output=0
this.input=0
this.state=0
}

out(){return{x:this.x+80,y:this.y+25}}
inp(){return{x:this.x,y:this.y+25}}

draw(){

ctx.fillStyle="#333"
ctx.fillRect(this.x,this.y,80,50)

ctx.fillStyle="white"
ctx.fillText(this.type,this.x+10,this.y+15)

// input
let i=this.inp()
ctx.fillStyle=this.input?"red":"blue"
circle(i.x,i.y,6)

// output
let o=this.out()
ctx.fillStyle=this.output?"red":"blue"
circle(o.x,o.y,6)

// LED
if(this.type==="LED"){
ctx.fillStyle=this.output?"red":"#222"
circle(this.x+40,this.y+30,12)
}
}

}

function circle(x,y,r){
ctx.beginPath()
ctx.arc(x,y,r,0,Math.PI*2)
ctx.fill()
}

//====================

function addGate(t){
gates.push(new Gate(t,120,120))
}

//====================
// POINTER EVENTS (iPad対応)
//====================

cv.onpointerdown=e=>{

const x=e.offsetX
const y=e.offsetY

for(let g of gates){

// OUTPUTクリック
let o=g.out()
if(dist(x,y,o.x,o.y)<8){
connectFrom=g
return
}

// INPUTクリック
let i=g.inp()
if(dist(x,y,i.x,i.y)<8 && connectFrom){
wires.push({from:connectFrom,to:g})
connectFrom=null
return
}

// 本体ドラッグ
if(hit(x,y,g.x,g.y,80,50)){
dragging=g

if(g.type==="INPUT"){
g.state^=1
}
return
}

}

}

cv.onpointermove=e=>{
if(dragging){
dragging.x=e.offsetX-40
dragging.y=e.offsetY-25
}
}

cv.onpointerup=()=>{
dragging=null
}

//====================

function hit(x,y,rx,ry,w,h){
return x>rx&&x<rx+w&&y>ry&&y<ry+h
}

function dist(x1,y1,x2,y2){
return Math.hypot(x1-x2,y1-y2)
}

//====================
// LOGIC
//====================

function evaluate(){

gates.forEach(g=>g.input=0)

wires.forEach(w=>{
w.to.input=w.from.output
})

gates.forEach(g=>{

if(g.type==="INPUT")
g.output=g.state

if(g.type==="LED")
g.output=g.input

})

}

//====================

function draw(){

ctx.clearRect(0,0,cv.width,cv.height)

// wires
wires.forEach(w=>{
let a=w.from.out()
let b=w.to.inp()

ctx.strokeStyle=w.from.output?"red":"blue"
ctx.lineWidth=3
ctx.beginPath()
ctx.moveTo(a.x,a.y)
ctx.lineTo(b.x,b.y)
ctx.stroke()
})

// gates
gates.forEach(g=>g.draw())

}

//====================

function loop(){

if(running) evaluate()

draw()
requestAnimationFrame(loop)
}

loop()

</script>
</body>
</html>
