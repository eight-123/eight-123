<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>歴史学習タイムライン</title>

<style>
body{
  font-family: sans-serif;
  padding: 20px;
}

input, button{
  padding: 6px;
  margin: 5px;
}

#timeline{
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding: 10px;
  border-top: 2px solid #333;
  margin-top: 20px;
}

.card{
  min-width: 240px;
  border: 1px solid #aaa;
  border-radius: 10px;
  padding: 10px;
  background: #f7f7f7;
  flex-shrink: 0;
}

.year{
  font-weight: bold;
  font-size: 18px;
}

.era{
  font-size: 12px;
  color: #666;
}

.category{
  font-size: 12px;
  color: #0077cc;
}

button.small{
  font-size: 12px;
  margin-top: 5px;
}
</style>
</head>

<body>

<h2>📚 歴史学習タイムライン</h2>

<input id="year" type="number" placeholder="西暦">
<input id="text" type="text" placeholder="出来事">
<input id="category" type="text" placeholder="分類（戦争・文化など）">
<button onclick="addEvent()">追加</button>

<div id="timeline"></div>

<script>
// =========================
// 元号データ（細かめ版）
// =========================
const eras = [
  {name:"令和", start:2019},
  {name:"平成", start:1989},
  {name:"昭和", start:1926},
  {name:"大正", start:1912},
  {name:"明治", start:1868},

  // 幕末〜江戸後期
  {name:"慶応", start:1865},
  {name:"元治", start:1864},
  {name:"文久", start:1861},
  {name:"万延", start:1860},
  {name:"安政", start:1854},
  {name:"嘉永", start:1848},
  {name:"弘化", start:1844},
  {name:"天保", start:1830},
  {name:"文政", start:1818},
  {name:"文化", start:1804},
  {name:"享和", start:1801},
  {name:"寛政", start:1789},
  {name:"天明", start:1781},
  {name:"安永", start:1772},
  {name:"明和", start:1764},
  {name:"宝暦", start:1751},
  {name:"延享", start:1744},
  {name:"寛保", start:1741},
  {name:"元文", start:1736},
  {name:"享保", start:1716},

  // 宝永など
  {name:"正徳", start:1711},
  {name:"宝永", start:1704},
  {name:"元禄", start:1688},
  {name:"貞享", start:1684},
  {name:"天和", start:1681},

  // それ以前
  {name:"江戸初期", start:1603},
  {name:"安土桃山", start:1573},
  {name:"室町", start:1336},
  {name:"鎌倉", start:1185},
  {name:"平安", start:794}
];

// =========================
// 和暦変換
// =========================
function toEra(year){
  for(let i=0;i<eras.length;i++){
    const e = eras[i];
    const next = eras[i-1];

    if(year >= e.start){
      return `${e.name}${year - e.start + 1}年`;
    }
  }
  return "不明";
}

// =========================
// データ
// =========================
let data = JSON.parse(localStorage.getItem("timeline") || "[]");

// 保存
function save(){
  localStorage.setItem("timeline", JSON.stringify(data));
}

// =========================
// 追加
// =========================
function addEvent(){
  const year = parseInt(document.getElementById("year").value);
  const text = document.getElementById("text").value;
  const category = document.getElementById("category").value;

  if(!year || !text) return;

  data.push({year, text, category});
  update();

  document.getElementById("year").value = "";
  document.getElementById("text").value = "";
  document.getElementById("category").value = "";
}

// =========================
// 編集
// =========================
function editEvent(i){
  const y = prompt("西暦", data[i].year);
  const t = prompt("出来事", data[i].text);
  const c = prompt("分類", data[i].category);

  if(y && t){
    data[i] = {
      year: parseInt(y),
      text: t,
      category: c
    };
    update();
  }
}

// =========================
// 削除
// =========================
function deleteEvent(i){
  data.splice(i,1);
  update();
}

// =========================
// 更新処理
// =========================
function update(){
  data.sort((a,b)=>a.year-b.year);
  save();
  render();
}

// =========================
// 描画
// =========================
function render(){
  const tl = document.getElementById("timeline");
  tl.innerHTML = "";

  data.forEach((d,i)=>{
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="year">${d.year}</div>
      <div class="era">${toEra(d.year)}</div>
      <div class="category">📌 ${d.category || "未分類"}</div>
      <div>${d.text}</div>

      <button class="small" onclick="editEvent(${i})">編集</button>
      <button class="small" onclick="deleteEvent(${i})">削除</button>
    `;

    tl.appendChild(div);
  });
}

update();
</script>

</body>
</html>
