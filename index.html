<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>学習OS（完成安定版）</title>

<style>
body{
  font-family: sans-serif;
  padding: 20px;
}

/* タブ */
.tabs{
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

.tab{
  padding:8px 12px;
  border:1px solid #333;
  border-radius:6px;
  cursor:pointer;
  background:#eee;
}

.tab.active{
  background:#333;
  color:white;
}

.page{ display:none; }
.page.active{ display:block; }

/* ===================== */
/* 歴史（そのまま） */
/* ===================== */
#timeline{
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding:10px;
  border-top:2px solid #333;
  margin-top:20px;
}

.card{
  min-width:240px;
  border:1px solid #aaa;
  border-radius:10px;
  padding:10px;
  background:#f7f7f7;
  flex-shrink:0;
}

.year{ font-weight:bold; font-size:18px; }
.era{ font-size:12px; color:#666; }
.category{ font-size:12px; color:#0077cc; }

/* ===================== */
/* 理科ノート */
/* ===================== */
#pageList div{
  border:1px solid #aaa;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  cursor:pointer;
  background:#fafafa;
}

#canvas{
  border:1px solid #ccc;
  width:100%;
  height:500px;
  background:white;
  touch-action:none; /* スクロール完全防止 */
}

/* ===================== */
/* 数学 */
/* ===================== */
.math-card{
  border:1px solid #aaa;
  border-radius:10px;
  padding:10px;
  margin:5px 0;
  background:#f7f7f7;
}
</style>
</head>

<body>

<h2>📚 学習OS</h2>

<div class="tabs">
  <div class="tab active" onclick="switchTab('history')">歴史</div>
  <div class="tab" onclick="switchTab('science')">理科</div>
  <div class="tab" onclick="switchTab('math')">数学</div>
</div>

<!-- ===================== -->
<!-- 歴史 -->
<!-- ===================== -->
<div id="history" class="page active">

<h3>📚 歴史タイムライン</h3>

<input id="year" type="number" placeholder="西暦">
<input id="text" type="text" placeholder="出来事">
<input id="category" type="text" placeholder="分類">
<button onclick="addEvent()">追加</button>

<div id="timeline"></div>
</div>

<!-- ===================== -->
<!-- 理科（完全ノート） -->
<!-- ===================== -->
<div id="science" class="page">

<h3>🧪 理科ノート</h3>

<div id="listView">
  <input id="pageTitle" placeholder="ページ名（例：力）">
  <button onclick="createPage()">＋作成</button>

  <div id="pageList"></div>
</div>

<div id="editorView" style="display:none;">
  <h4 id="nowTitle"></h4>

  <div style="margin-bottom:10px;">
    <button onclick="setTool('pen')">✏</button>
    <button onclick="setTool('bold')">🖊</button>
    <button onclick="setTool('eraser')">🧽</button>
    <button onclick="deletePage()">🗑 削除</button>
    <button onclick="backToList()">←戻る</button>
  </div>

  <canvas id="canvas"></canvas>
</div>

</div>

<!-- ===================== -->
<!-- 数学 -->
<!-- ===================== -->
<div id="math" class="page">

<h3>➗ 数学ノート</h3>

<input id="m_cat" placeholder="カテゴリ">
<input id="m_title" placeholder="公式">
<input id="m_text" placeholder="説明">
<button onclick="addMath()">追加</button>

<div id="mathList"></div>
</div>

<script>

/* =====================
タブ
===================== */
function switchTab(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  event.target.classList.add("active");
}

/* =====================
歴史（そのまま）
===================== */
const eras=[
  {name:"令和",start:2019},
  {name:"平成",start:1989},
  {name:"昭和",start:1926},
  {name:"大正",start:1912},
  {name:"明治",start:1868},
  {name:"宝永",start:1704},
  {name:"元禄",start:1688},
  {name:"江戸",start:1603},
  {name:"室町",start:1336},
  {name:"鎌倉",start:1185},
  {name:"平安",start:794}
];

function toEra(y){
  for(let i=0;i<eras.length;i++){
    if(y>=eras[i].start){
      return eras[i].name+(y-eras[i].start+1)+"年";
    }
  }
  return "不明";
}

let data=JSON.parse(localStorage.getItem("timeline")||"[]");

function addEvent(){
  const y=+year.value;
  const t=text.value;
  const c=category.value;

  if(!y||!t)return;

  data.push({year:y,text:t,category:c});
  localStorage.setItem("timeline",JSON.stringify(data));
  renderHistory();

  year.value=text.value=category.value="";
}

function renderHistory(){
  const tl=document.getElementById("timeline");
  tl.innerHTML="";
  data.sort((a,b)=>a.year-b.year);

  data.forEach(d=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`
      <div class="year">${d.year}</div>
      <div class="era">${toEra(d.year)}</div>
      <div class="category">${d.category||""}</div>
      <div>${d.text}</div>
    `;
    tl.appendChild(div);
  });
}
renderHistory();

/* =====================
理科（安定ノート）
===================== */
let pages = JSON.parse(localStorage.getItem("science_pages") || "[]");

let current = null;
let tool = "pen";

let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let drawing = false;
let stroke = null;

if(pages.length === 0){
  pages.push({title:"ノート1",strokes:[]});
}

resize();
renderList();

/* サイズ */
function resize(){
  const r = canvas.getBoundingClientRect();
  canvas.width = r.width;
  canvas.height = 500;
}
window.addEventListener("resize", resize);

/* =====================
一覧
===================== */
function renderList(){
  const el = document.getElementById("pageList");
  el.innerHTML = "";

  pages.forEach((p,i)=>{
    const div = document.createElement("div");
    div.innerText = "📘 " + p.title;
    div.onclick = () => openPage(i);
    el.appendChild(div);
  });
}

/* 作成 */
function createPage(){
  const t = pageTitle.value;
  if(!t) return;

  pages.push({title:t,strokes:[]});
  save();
  renderList();
  pageTitle.value = "";
}

/* 開く */
function openPage(i){
  current = i;

  listView.style.display = "none";
  editorView.style.display = "block";

  nowTitle.innerText = pages[i].title;

  drawPage();
}

/* 戻る */
function backToList(){
  save();
  renderList();

  listView.style.display = "block";
  editorView.style.display = "none";
}

/* 削除 */
function deletePage(){
  if(current === null) return;

  if(!confirm("削除する？")) return;

  pages.splice(current,1);

  if(pages.length === 0){
    pages.push({title:"ノート1",strokes:[]});
  }

  current = null;

  save();
  renderList();
  backToList();
}

/* ツール */
function setTool(t){
  tool = t;
}

/* 座標安定 */
function pos(e){
  const r = canvas.getBoundingClientRect();
  return {
    x:(e.touches?e.touches[0].clientX:e.clientX)-r.left,
    y:(e.touches?e.touches[0].clientY:e.clientY)-r.top
  };
}

/* 描画再生 */
function drawPage(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const p = pages[current];
  if(!p) return;

  p.strokes.forEach(s=>{
    ctx.lineCap="round";
    ctx.lineJoin="round";

    ctx.globalCompositeOperation =
      s.tool==="eraser" ? "destination-out" : "source-over";

    ctx.lineWidth =
      s.tool==="bold" ? 6 :
      s.tool==="pen" ? 2 : 20;

    ctx.beginPath();

    s.points.forEach((pt,i)=>{
      if(i===0) ctx.moveTo(pt.x,pt.y);
      else ctx.lineTo(pt.x,pt.y);
    });

    ctx.stroke();
  });
}

/* 描画 */
canvas.addEventListener("mousedown",start);
canvas.addEventListener("touchstart",start,{passive:false});

function start(e){
  drawing = true;

  stroke = {
    tool: tool,
    points: []
  };

  stroke.points.push(pos(e));
}

canvas.addEventListener("mousemove",draw);
canvas.addEventListener("touchmove",draw,{passive:false});

function draw(e){
  if(!drawing) return;

  e.preventDefault();

  stroke.points.push(pos(e));

  drawPage();
}

canvas.addEventListener("mouseup",end);
canvas.addEventListener("touchend",end);

function end(){
  if(!drawing) return;
  drawing = false;

  pages[current].strokes.push(stroke);
  save();
}

/* 保存 */
function save(){
  localStorage.setItem("science_pages",JSON.stringify(pages));
}

/* =====================
数学
===================== */
let math=JSON.parse(localStorage.getItem("math")||"[]");

function addMath(){
  math.push({
    c:m_cat.value,
    t:m_title.value,
    d:m_text.value
  });

  localStorage.setItem("math",JSON.stringify(math));
  renderMath();

  m_cat.value=m_title.value=m_text.value="";
}

function renderMath(){
  const el=document.getElementById("mathList");
  el.innerHTML="";

  const g={};

  math.forEach(m=>{
    if(!g[m.c])g[m.c]=[];
    g[m.c].push(m);
  });

  for(const c in g){
    const div=document.createElement("div");
    div.className="math-card";
    div.innerHTML=`<b>${c}</b><br>`;

    g[c].forEach(m=>{
      div.innerHTML+=`➗ ${m.t}<br>${m.d}<br><br>`;
    });

    el.appendChild(div);
  }
}
renderMath();

</script>

</body>
</html>
