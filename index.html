<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>年表ツール</title>

<link rel="stylesheet"
 href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
  margin:0;
  font-family:sans-serif;
  display:flex;
  height:100vh;
}

/* ===== 左：年表 ===== */

#left{
  width:60%;
  overflow-y:auto;
  background:#f5f5f5;
  padding:20px;
}

#timeline{
  position:relative;
  border-left:4px solid black;
  margin-left:40px;
}

.event{
  position:absolute;
  background:white;
  padding:8px;
  border-radius:6px;
  box-shadow:0 0 5px #aaa;
  cursor:pointer;
  width:300px;
}

/* ===== 右：地図 ===== */

#right{
  width:40%;
  display:flex;
  flex-direction:column;
}

#map{
  flex:1;
}

/* ===== 入力 ===== */

input,button{
  margin:3px;
}
</style>
</head>

<body>

<!-- ================= 左 ================= -->

<div id="left">

<h2>年表</h2>

<input id="year" placeholder="年（例 1600 / -300）">
<input id="title" placeholder="出来事">
<input id="place" placeholder="場所（大阪・中国など）">
<button onclick="addEvent()">追加</button>

<br>

<button onclick="mode='normal';render()">
通常表示
</button>

<button onclick="mode='scale';render()">
年代比例表示
</button>

<div id="timeline"></div>

</div>

<!-- ================= 右 ================= -->

<div id="right">

<h3>地図</h3>

<input id="mapSearch" placeholder="地名検索">
<button onclick="searchPlace()">地図検索</button>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

/* ================= データ ================= */

let events=[]
let mode="normal"

/* ================= 地図 ================= */

const map=L.map('map').setView([35,135],5)

L.tileLayer(
 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map)

let marker=null

/* ================= 年号変換 ================= */

function gengou(year){

if(year>=2019) return "令和"
if(year>=1989) return "平成"
if(year>=1926) return "昭和"
if(year>=1912) return "大正"
if(year>=1868) return "明治"

/* 江戸以前（ざっくり） */
if(year>=1603) return "江戸"
if(year>=1336) return "室町"
if(year>=1185) return "鎌倉"
if(year>=794) return "平安"
if(year>=710) return "奈良"
if(year>=538) return "飛鳥"
if(year>=250) return "古墳"
if(year>=-300) return "弥生"
return "縄文"
}

/* ================= 追加 ================= */

function addEvent(){

const year=parseInt(year.value)
if(isNaN(year)) return alert("年を入力")

events.push({
  year,
  title:title.value,
  place:place.value
})

year.value=""
title.value=""
place.value=""

render()
}

/* ================= 描画 ================= */

function render(){

const tl=document.getElementById("timeline")
tl.innerHTML=""

events.sort((a,b)=>a.year-b.year)

if(events.length===0) return

let min=events[0].year
let max=events[events.length-1].year

events.forEach((e,i)=>{

let y

if(mode==="normal"){
  y=i*90
}else{
  y=(e.year-min)/(max-min)*2000
}

const div=document.createElement("div")
div.className="event"
div.style.top=y+"px"

div.innerHTML=
`<b>${gengou(e.year)} ${e.year}年</b><br>
${e.title}<br>
📍${e.place}`

div.onclick=()=>jumpMap(e.place)

tl.appendChild(div)
})

tl.style.height="2100px"
}

/* ================= 地図ジャンプ ================= */

async function jumpMap(place){

if(!place) return

const url=
`https://nominatim.openstreetmap.org/search?format=json&q=${place}`

const res=await fetch(url)
const data=await res.json()

if(!data.length) return alert("場所不明")

const lat=data[0].lat
const lon=data[0].lon

map.setView([lat,lon],6)

if(marker) map.removeLayer(marker)

marker=L.marker([lat,lon]).addTo(map)
}

/* ================= 地図検索 ================= */

function searchPlace(){
jumpMap(mapSearch.value)
}

</script>
</body>
</html>
