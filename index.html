<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>学習OS（歴史・理科・数学）</title>

<style>
body{
  font-family: sans-serif;
  padding: 20px;
}

/* タブ */
.tabs{
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

.tab{
  padding:8px 12px;
  border:1px solid #333;
  border-radius:6px;
  cursor:pointer;
  background:#eee;
}

.tab.active{
  background:#333;
  color:white;
}

/* ページ */
.page{ display:none; }
.page.active{ display:block; }

/* ===================== */
/* 歴史（そのまま） */
/* ===================== */
#timeline{
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding:10px;
  border-top:2px solid #333;
  margin-top:20px;
}

.card{
  min-width:240px;
  border:1px solid #aaa;
  border-radius:10px;
  padding:10px;
  background:#f7f7f7;
  flex-shrink:0;
}

.year{ font-weight:bold; font-size:18px; }
.era{ font-size:12px; color:#666; }
.category{ font-size:12px; color:#0077cc; }

button.small{ font-size:12px; margin-top:5px; }

/* ===================== */
/* 理科（修正版ドラッグ） */
/* ===================== */
#map{
  width:100%;
  height:500px;
  border:1px solid #ccc;
  position:relative;
  background:#fafafa;
  overflow:hidden;
}

.node{
  position:absolute;
  width:140px;
  padding:6px;
  font-size:12px;
  background:#f7f7f7;
  border:1px solid #aaa;
  border-radius:8px;
  cursor:grab;
  user-select:none;
}

/* 線 */
.link-line{
  position:absolute;
  height:2px;
  background:#555;
  transform-origin:0 0;
}

/* ===================== */
/* 数学 */
/* ===================== */
.math-card{
  border:1px solid #aaa;
  border-radius:10px;
  padding:10px;
  margin:5px 0;
  background:#f7f7f7;
}
</style>
</head>

<body>

<h2>📚 学習OS</h2>

<div class="tabs">
  <div class="tab active" onclick="switchTab('history')">歴史</div>
  <div class="tab" onclick="switchTab('science')">理科</div>
  <div class="tab" onclick="switchTab('math')">数学</div>
</div>

<!-- ===================== -->
<!-- 歴史（そのまま） -->
<!-- ===================== -->
<div id="history" class="page active">

<h3>📚 歴史タイムライン</h3>

<input id="year" type="number" placeholder="西暦">
<input id="text" type="text" placeholder="出来事">
<input id="category" type="text" placeholder="分類">
<button onclick="addEvent()">追加</button>

<div id="timeline"></div>
</div>

<!-- ===================== -->
<!-- 理科（ドラッグ修正版） -->
<!-- ===================== -->
<div id="science" class="page">

<h3>🧪 理科マインドマップ</h3>

<input id="sc_parent" placeholder="親テーマ">
<input id="sc_child" placeholder="子テーマ">
<input id="sc_text" placeholder="説明">
<button onclick="addScience()">追加</button>

<div id="map"></div>
</div>

<!-- ===================== -->
<!-- 数学（そのまま） -->
<!-- ===================== -->
<div id="math" class="page">

<h3>➗ 数学ノート</h3>

<input id="m_cat" placeholder="カテゴリ">
<input id="m_title" placeholder="公式">
<input id="m_text" placeholder="説明">
<button onclick="addMath()">追加</button>

<div id="mathList"></div>
</div>

<script>
// =====================
// タブ
// =====================
function switchTab(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  event.target.classList.add("active");
}

// =====================
// 歴史（そのまま）
// =====================
const eras=[
  {name:"令和",start:2019},
  {name:"平成",start:1989},
  {name:"昭和",start:1926},
  {name:"大正",start:1912},
  {name:"明治",start:1868},
  {name:"宝永",start:1704},
  {name:"元禄",start:1688},
  {name:"江戸",start:1603},
  {name:"室町",start:1336},
  {name:"鎌倉",start:1185},
  {name:"平安",start:794}
];

function toEra(y){
  for(let i=0;i<eras.length;i++){
    if(y>=eras[i].start){
      return eras[i].name+(y-eras[i].start+1)+"年";
    }
  }
  return "不明";
}

let data=JSON.parse(localStorage.getItem("timeline")||"[]");

function addEvent(){
  const y=+year.value;
  const t=text.value;
  const c=category.value;

  if(!y||!t)return;

  data.push({year:y,text:t,category:c});
  saveHistory();
  renderHistory();

  year.value=text.value=category.value="";
}

function saveHistory(){
  localStorage.setItem("timeline",JSON.stringify(data));
}

function renderHistory(){
  const tl=document.getElementById("timeline");
  tl.innerHTML="";

  data.sort((a,b)=>a.year-b.year);

  data.forEach((d,i)=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`
      <div class="year">${d.year}</div>
      <div class="era">${toEra(d.year)}</div>
      <div class="category">${d.category||""}</div>
      <div>${d.text}</div>
    `;
    tl.appendChild(div);
  });
}

renderHistory();

// =====================
// 理科（ドラッグ完全修正版）
// =====================
let science=JSON.parse(localStorage.getItem("science")||"[]");
let links=JSON.parse(localStorage.getItem("links")||"[]");

let nodes={};
let selected=null;

function addScience(){
  const p=sc_parent.value;
  const c=sc_child.value;
  const t=sc_text.value;

  if(!p||!c)return;

  science.push({
    id:Date.now(),
    parent:p,
    child:c,
    text:t,
    x:100+Math.random()*200,
    y:100+Math.random()*200
  });

  saveScience();
  renderScience();

  sc_parent.value=sc_child.value=sc_text.value="";
}

function saveScience(){
  localStorage.setItem("science",JSON.stringify(science));
  localStorage.setItem("links",JSON.stringify(links));
}

function renderScience(){
  const map=document.getElementById("map");
  map.innerHTML="";
  nodes={};

  const parents=[...new Set(science.map(s=>s.parent))];
  const pos={};

  parents.forEach((p,i)=>{
    pos[p]={x:120,y:80+i*140};
  });

  science.forEach(s=>{

    if(!nodes[s.parent]){
      const pn=createNode("🌿 "+s.parent,pos[s.parent].x,pos[s.parent].y);
      nodes[s.parent]=pn;
      map.appendChild(pn.el);
    }

    const cn=createNode(s.child+"\n"+(s.text||""),s.x,s.y);
    nodes[s.id]=cn;
    map.appendChild(cn.el);

    // クリックで選択→リンク
    cn.el.onclick=(e)=>{
      e.stopPropagation();
      selectNode(s.id);
    };

    // ダブルクリック編集
    cn.el.ondblclick=(e)=>{
      e.stopPropagation();
      editScience(s.id);
    };

    // 削除
    const btn=document.createElement("button");
    btn.innerText="削除";
    btn.onclick=(e)=>{
      e.stopPropagation();
      deleteScience(s.id);
    };
    cn.el.appendChild(btn);

    enableDrag(cn,s);
  });

  drawLinks();
}

function createNode(text,x,y){
  const div=document.createElement("div");
  div.className="node";
  div.style.left=x+"px";
  div.style.top=y+"px";
  div.innerText=text;
  return {el:div};
}

// ⭐ ここが修正ポイント（ドラッグ安定版）
function enableDrag(node){
  let offsetX=0,offsetY=0;

  node.el.onmousedown=(e)=>{
    const mapRect=document.getElementById("map").getBoundingClientRect();
    const rect=node.el.getBoundingClientRect();

    offsetX=e.clientX-rect.left;
    offsetY=e.clientY-rect.top;

    document.onmousemove=(e)=>{
      let x=e.clientX-mapRect.left-offsetX;
      let y=e.clientY-mapRect.top-offsetY;

      node.el.style.left=x+"px";
      node.el.style.top=y+"px";

      science.forEach(s=>{
        const n=nodes[s.id];
        if(n){
          s.x=parseInt(n.el.style.left);
          s.y=parseInt(n.el.style.top);
        }
      });

      saveScience();
      drawLinks();
    };

    document.onmouseup=()=>{
      document.onmousemove=null;
    };
  };
}

function selectNode(id){
  if(!selected){
    selected=id;
    return;
  }

  if(selected===id){
    selected=null;
    return;
  }

  links.push({from:selected,to:id});
  selected=null;

  saveScience();
  renderScience();
}

function drawLinks(){
  document.querySelectorAll(".link-line").forEach(l=>l.remove());

  links.forEach(l=>{
    const a=nodes[l.from];
    const b=nodes[l.to];
    if(!a||!b)return;

    const line=document.createElement("div");
    line.className="link-line";

    const x1=parseFloat(a.el.style.left)+70;
    const y1=parseFloat(a.el.style.top)+20;
    const x2=parseFloat(b.el.style.left)+70;
    const y2=parseFloat(b.el.style.top)+20;

    const len=Math.hypot(x2-x1,y2-y1);
    const ang=Math.atan2(y2-y1,x2-x1)*180/Math.PI;

    line.style.width=len+"px";
    line.style.left=x1+"px";
    line.style.top=y1+"px";
    line.style.transform=`rotate(${ang}deg)`;

    map.appendChild(line);
  });
}

function editScience(id){
  const s=science.find(x=>x.id===id);
  if(!s)return;

  const p=prompt("親",s.parent);
  const c=prompt("子",s.child);
  const t=prompt("説明",s.text);

  if(p!==null)s.parent=p;
  if(c!==null)s.child=c;
  if(t!==null)s.text=t;

  saveScience();
  renderScience();
}

function deleteScience(id){
  science=science.filter(s=>s.id!==id);
  links=links.filter(l=>l.from!==id&&l.to!==id);
  saveScience();
  renderScience();
}

renderScience();

// =====================
// 数学（そのまま）
// =====================
let math=JSON.parse(localStorage.getItem("math")||"[]");

function addMath(){
  math.push({
    c:m_cat.value,
    t:m_title.value,
    d:m_text.value
  });

  localStorage.setItem("math",JSON.stringify(math));
  renderMath();

  m_cat.value=m_title.value=m_text.value="";
}

function renderMath(){
  const el=document.getElementById("mathList");
  el.innerHTML="";

  const g={};

  math.forEach((m,i)=>{
    if(!g[m.c])g[m.c]=[];
    g[m.c].push({...m,i});
  });

  for(const c in g){
    const div=document.createElement("div");
    div.className="math-card";
    div.innerHTML=`<b>${c}</b><br>`;

    g[c].forEach(m=>{
      div.innerHTML+=`
        ➗ ${m.t}<br>
        ${m.d}<br><br>
      `;
    });

    el.appendChild(div);
  }
}

renderMath();
</script>

</body>
</html>
