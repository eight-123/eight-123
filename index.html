<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>年表ツール</title>

<style>

body{
  font-family:sans-serif;
  padding:20px;
}

h2{
  margin-bottom:10px;
}

input,button{
  font-size:16px;
  margin:5px;
}

#timeline{
  display:flex;
  overflow-x:auto;
  gap:20px;
  padding:20px;
  border-top:2px solid black;
}

.card{
  min-width:220px;
  border:1px solid #ccc;
  border-radius:10px;
  padding:10px;
  background:#f5f5f5;
}

.year{
  font-weight:bold;
  font-size:20px;
}

button{
  margin-top:5px;
}

</style>
</head>

<body>

<h2>年表ツール</h2>

年：
<input id="year" type="number">

出来事：
<input id="event" type="text">

<button id="addBtn">追加</button>

<div id="timeline"></div>

<script>

// ======================
// 要素取得（←重要）
// ======================
const yearInput = document.getElementById("year");
const eventInput = document.getElementById("event");
const addBtn = document.getElementById("addBtn");
const timeline = document.getElementById("timeline");

// ======================
// データ読み込み
// ======================
let data = JSON.parse(localStorage.getItem("timeline")) || [];

draw();

// ======================
// 追加ボタン
// ======================
addBtn.addEventListener("click", addEvent);

// ======================
// 追加
// ======================
function addEvent(){

  const year = Number(yearInput.value);
  const event = eventInput.value.trim();

  if(!year || !event){
    alert("入力して！");
    return;
  }

  data.push({
    id:Date.now(),
    year:year,
    event:event
  });

  save();
  sortData();
  draw();

  yearInput.value="";
  eventInput.value="";
}

// ======================
// ソート
// ======================
function sortData(){
  data.sort((a,b)=>a.year-b.year);
}

// ======================
// 保存
// ======================
function save(){
  localStorage.setItem("timeline",JSON.stringify(data));
}

// ======================
// 削除
// ======================
function removeEvent(id){
  data=data.filter(item=>item.id!==id);
  save();
  draw();
}

// ======================
// 編集
// ======================
function editEvent(id){

  const item=data.find(d=>d.id===id);

  const newYear=prompt("年を編集",item.year);
  const newEvent=prompt("出来事を編集",item.event);

  if(!newYear || !newEvent)return;

  item.year=Number(newYear);
  item.event=newEvent;

  save();
  sortData();
  draw();
}

// ======================
// 描画
// ======================
function draw(){

  timeline.innerHTML="";

  sortData();

  data.forEach(item=>{

    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <div class="year">${item.year}</div>
      <div>${item.event}</div>
      <button onclick="editEvent(${item.id})">編集</button>
      <button onclick="removeEvent(${item.id})">削除</button>
    `;

    timeline.appendChild(card);
  });
}

</script>

</body>
</html>
