<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>学習OS（安定版）</title>

<style>
body{
  font-family: sans-serif;
  padding: 20px;
}

/* タブ */
.tabs{
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

.tab{
  padding:8px 12px;
  border:1px solid #333;
  border-radius:6px;
  cursor:pointer;
  background:#eee;
}

.tab.active{
  background:#333;
  color:white;
}

.page{ display:none; }
.page.active{ display:block; }

/* ===================== */
/* 歴史（そのまま） */
/* ===================== */
#timeline{
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding:10px;
  border-top:2px solid #333;
  margin-top:20px;
}

.card{
  min-width:240px;
  border:1px solid #aaa;
  border-radius:10px;
  padding:10px;
  background:#f7f7f7;
  flex-shrink:0;
}

.year{ font-weight:bold; font-size:18px; }
.era{ font-size:12px; color:#666; }
.category{ font-size:12px; color:#0077cc; }

/* ===================== */
/* 理科（安定ノート） */
/* ===================== */
.toolbar{
  margin-bottom:10px;
}

#canvas{
  border:1px solid #ccc;
  width:100%;
  height:500px;
  background:white;
  touch-action:none; /* スクロール完全防止 */
}

/* ===================== */
/* 数学 */
/* ===================== */
.math-card{
  border:1px solid #aaa;
  border-radius:10px;
  padding:10px;
  margin:5px 0;
  background:#f7f7f7;
}
</style>
</head>

<body>

<h2>📚 学習OS</h2>

<div class="tabs">
  <div class="tab active" onclick="switchTab('history')">歴史</div>
  <div class="tab" onclick="switchTab('science')">理科</div>
  <div class="tab" onclick="switchTab('math')">数学</div>
</div>

<!-- ===================== -->
<!-- 歴史 -->
<!-- ===================== -->
<div id="history" class="page active">

<h3>📚 歴史タイムライン</h3>

<input id="year" type="number" placeholder="西暦">
<input id="text" type="text" placeholder="出来事">
<input id="category" type="text" placeholder="分類">
<button onclick="addEvent()">追加</button>

<div id="timeline"></div>
</div>

<!-- ===================== -->
<!-- 理科（安定ペンノート） -->
<!-- ===================== -->
<div id="science" class="page">

<h3>🧪 理科ノート（安定手書き）</h3>

<div class="toolbar">
  <button onclick="setTool('pen')">✏ ペン</button>
  <button onclick="setTool('bold')">🖊 太ペン</button>
  <button onclick="setTool('eraser')">🧽 消しゴム</button>

  <button onclick="addPage()">＋ページ</button>
  <button onclick="prevPage()">←</button>
  <button onclick="nextPage()">→</button>

  <span id="pageInfo"></span>
</div>

<canvas id="canvas"></canvas>

</div>

<!-- ===================== -->
<!-- 数学 -->
<!-- ===================== -->
<div id="math" class="page">

<h3>➗ 数学ノート</h3>

<input id="m_cat" placeholder="カテゴリ">
<input id="m_title" placeholder="公式">
<input id="m_text" placeholder="説明">
<button onclick="addMath()">追加</button>

<div id="mathList"></div>
</div>

<script>

/* =====================
   タブ
===================== */
function switchTab(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  event.target.classList.add("active");
}

/* =====================
   歴史（そのまま）
===================== */
const eras=[
  {name:"令和",start:2019},
  {name:"平成",start:1989},
  {name:"昭和",start:1926},
  {name:"大正",start:1912},
  {name:"明治",start:1868},
  {name:"宝永",start:1704},
  {name:"元禄",start:1688},
  {name:"江戸",start:1603},
  {name:"室町",start:1336},
  {name:"鎌倉",start:1185},
  {name:"平安",start:794}
];

function toEra(y){
  for(let i=0;i<eras.length;i++){
    if(y>=eras[i].start){
      return eras[i].name+(y-eras[i].start+1)+"年";
    }
  }
  return "不明";
}

let data=JSON.parse(localStorage.getItem("timeline")||"[]");

function addEvent(){
  const y=+year.value;
  const t=text.value;
  const c=category.value;
  if(!y||!t)return;

  data.push({year:y,text:t,category:c});
  localStorage.setItem("timeline",JSON.stringify(data));
  renderHistory();

  year.value=text.value=category.value="";
}

function renderHistory(){
  const tl=document.getElementById("timeline");
  tl.innerHTML="";
  data.sort((a,b)=>a.year-b.year);

  data.forEach(d=>{
    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <div class="year">${d.year}</div>
      <div class="era">${toEra(d.year)}</div>
      <div class="category">${d.category||""}</div>
      <div>${d.text}</div>
    `;
    tl.appendChild(div);
  });
}
renderHistory();

/* =====================
   理科（安定版ペン）
===================== */
let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");

let pages=JSON.parse(localStorage.getItem("science_pages")||"[]");
let pageIndex=0;

let drawing=false;
let tool="pen";

let lastX=0,lastY=0;

if(pages.length===0) pages.push("");

resize();
loadPage();

function resize(){
  const rect=canvas.getBoundingClientRect();
  canvas.width=rect.width;
  canvas.height=500;
}
window.addEventListener("resize",resize);

/* ツール */
function setTool(t){ tool=t; }

/* ページ */
function addPage(){
  pages.push("");
  pageIndex=pages.length-1;
  save();
  loadPage();
}

function prevPage(){
  if(pageIndex>0){
    pageIndex--;
    loadPage();
  }
}

function nextPage(){
  if(pageIndex<pages.length-1){
    pageIndex++;
    loadPage();
  }
}

/* 保存 */
function save(){
  pages[pageIndex]=canvas.toDataURL();
  localStorage.setItem("science_pages",JSON.stringify(pages));
  pageInfo.innerText=`${pageIndex+1}/${pages.length}`;
}

/* 読み込み */
function loadPage(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  let img=new Image();
  img.onload=()=>ctx.drawImage(img,0,0);
  img.src=pages[pageIndex]||"";

  pageInfo.innerText=`${pageIndex+1}/${pages.length}`;
}

/* 座標（ズレ完全防止） */
function pos(e){
  const r=canvas.getBoundingClientRect();
  return {
    x:(e.touches?e.touches[0].clientX:e.clientX)-r.left,
    y:(e.touches?e.touches[0].clientY:e.clientY)-r.top
  };
}

/* 描画開始 */
canvas.addEventListener("mousedown",e=>{
  drawing=true;
  const p=pos(e);
  lastX=p.x; lastY=p.y;
});

canvas.addEventListener("touchstart",e=>{
  drawing=true;
  const p=pos(e);
  lastX=p.x; lastY=p.y;
});

/* 描画終了 */
canvas.addEventListener("mouseup",end);
canvas.addEventListener("touchend",end);

function end(){
  drawing=false;
  ctx.beginPath();
  save();
}

/* 描画 */
canvas.addEventListener("mousemove",draw);
canvas.addEventListener("touchmove",draw);

function draw(e){
  if(!drawing) return;

  const p=pos(e);

  ctx.lineCap="round";
  ctx.lineJoin="round";

  if(tool==="pen"){
    ctx.globalCompositeOperation="source-over";
    ctx.strokeStyle="black";
    ctx.lineWidth=2;
  }

  if(tool==="bold"){
    ctx.globalCompositeOperation="source-over";
    ctx.strokeStyle="black";
    ctx.lineWidth=6;
  }

  if(tool==="eraser"){
    ctx.globalCompositeOperation="destination-out";
    ctx.lineWidth=20;
  }

  ctx.beginPath();
  ctx.moveTo(lastX,lastY);
  ctx.lineTo(p.x,p.y);
  ctx.stroke();

  lastX=p.x;
  lastY=p.y;

  e.preventDefault(); // スクロール完全防止
}

/* =====================
   数学
===================== */
let math=JSON.parse(localStorage.getItem("math")||"[]");

function addMath(){
  math.push({
    c:m_cat.value,
    t:m_title.value,
    d:m_text.value
  });

  localStorage.setItem("math",JSON.stringify(math));
  renderMath();

  m_cat.value=m_title.value=m_text.value="";
}

function renderMath(){
  const el=document.getElementById("mathList");
  el.innerHTML="";

  const g={};

  math.forEach(m=>{
    if(!g[m.c])g[m.c]=[];
    g[m.c].push(m);
  });

  for(const c in g){
    const div=document.createElement("div");
    div.className="math-card";
    div.innerHTML=`<b>${c}</b><br>`;

    g[c].forEach(m=>{
      div.innerHTML+=`➗ ${m.t}<br>${m.d}<br><br>`;
    });

    el.appendChild(div);
  }
}
renderMath();

</script>

</body>
</html>
